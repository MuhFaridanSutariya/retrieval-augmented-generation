<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}AI Knowledge Assistant{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4" integrity="sha384-HGfztofotfshcF7+8n44JQL2oJmowVChPTg48S+jvZoztPfvwD79OC/LTtG6dMp+" crossorigin="anonymous"></script>
    <style>
        body { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
        .htmx-indicator { display: none; }
        .htmx-request .htmx-indicator { display: inline-flex; }
        .htmx-request.htmx-indicator { display: inline-flex; }
        .citation-pill { transition: background-color 0.15s ease; }
        .citation-pill:hover { background-color: #fde68a; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">
    {% block content %}{% endblock %}
    <script>
        // Suggestion chip -> fill the chat textarea so the user can review/edit before sending.
        document.addEventListener("click", (event) => {
            const chip = event.target.closest(".js-suggestion");
            if (!chip) return;
            const textarea = document.querySelector('textarea[name="question"]');
            if (!textarea) return;
            textarea.value = chip.dataset.question || chip.textContent.trim();
            textarea.focus();
        });
    </script>
</body>
</html>
